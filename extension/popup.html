<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 12px;
      background-color: #f6f3ee; /* Warm cream */
      color: #3c2f2f;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(141, 110, 99, 0.2);
      padding-bottom: 4px;
      color: #795548;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border: 1px solid rgba(141, 110, 99, 0.1);
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 11px;
    }
    .status-badge {
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 9px;
      text-transform: uppercase;
    }
    .status-active {
      background-color: rgba(34, 197, 94, 0.1);
      color: #15803d;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .status-auth {
      background-color: rgba(234, 88, 12, 0.1);
      color: #c2410c;
      border: 1px solid rgba(234, 88, 12, 0.2);
    }
    .status-error {
      background-color: rgba(239, 68, 68, 0.1);
      color: #b91c1c;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .status-idle {
      background-color: rgba(100, 116, 139, 0.1);
      color: #475569;
      border: 1px solid rgba(100, 116, 139, 0.2);
    }
    .btn-container {
      margin-top: 10px;
      display: flex;
      gap: 6px;
    }
    button {
      flex: 1;
      background: #8d6e63; /* clay primary */
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #795548;
    }
    .log-title {
      font-weight: bold;
      font-size: 10px;
      margin-top: 12px;
      margin-bottom: 4px;
      color: #795548;
    }
    .log-box {
      background: white;
      border: 1px solid rgba(141, 110, 99, 0.1);
      border-radius: 6px;
      height: 90px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 9px;
      padding: 6px;
      white-space: pre-wrap;
      color: #555;
    }
    .last-sync {
      font-size: 9px;
      color: #666;
      margin-top: 4px;
      text-align: right;
    }
  </style>
</head>
<body>
  <h3>Utkal IT Dashboard Scraper</h3>
  
  <div id="status-symphony" class="status-item">
    <span>ITSM (Symphony)</span>
    <span class="status-badge status-idle">Idle</span>
  </div>

  <div id="status-solarwinds" class="status-item">
    <span>SolarWinds Orion</span>
    <span class="status-badge status-idle">Idle</span>
  </div>

  <div id="status-nutanix" class="status-item">
    <span>Nutanix Prism</span>
    <span class="status-badge status-idle">Idle</span>
  </div>

  <div class="btn-container">
    <button id="btn-sync">Trigger Sync</button>
    <button id="btn-refresh-tabs">Reload Portals</button>
  </div>

  <div class="log-title">Sync Logs:</div>
  <div id="log-box" class="log-box">Waiting for events...</div>
  <div id="last-sync" class="last-sync">Last Sync: Never</div>

  <script src="popup.js"></script>
</body>
</html>
